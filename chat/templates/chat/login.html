<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Private Chat Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff9a9e,#a18cd1);
}

.login-container{
    width:350px;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-title{
    text-align:center;
    margin-bottom:25px;
    color:#4f46e5;
    font-size:28px;
    font-weight:bold;
}

.subtitle{
    text-align:center;
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    outline:none;
    font-size:15px;
    transition:0.3s;
}

.input-box input:focus{
    border-color:#4f46e5;
    box-shadow:0 0 8px rgba(79,70,229,0.2);
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#4f46e5;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#4338ca;
}

.error{
    background:#ffe5e5;
    color:red;
    padding:10px;
    border-radius:8px;
    margin-bottom:15px;
    text-align:center;
}

.footer-text{
    text-align:center;
    margin-top:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-container">

    <div class="login-title">
        Private Chat
    </div>

    <div class="subtitle">
        Only two users are allowed
    </div>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="input-box">
            <input 
                type="text" 
                name="username" 
                placeholder="Enter Username"
                required
            >
        </div>

        <div class="input-box">
            <input 
                type="password" 
                name="password" 
                placeholder="Enter Password"
                required
            >
        </div>

        <button class="login-btn" type="submit">
            Login
        </button>

    </form>

    <div class="footer-text">
        Secure Two-Person Messaging
    </div>

</div>

</body>
</html>
