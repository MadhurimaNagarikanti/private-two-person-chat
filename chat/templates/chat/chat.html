<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<script type="module"
src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js">
</script>

<style>

:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#ffffff;
    --sent:linear-gradient(135deg,#6366f1,#8b5cf6);
    --received:#334155;
}

body.light{
    --bg:#f3f4f6;
    --card:#ffffff;
    --text:#111827;
    --sent:linear-gradient(135deg,#ff9a9e,#fad0c4);
    --received:#e5e7eb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial,sans-serif;
    height:100vh;
}

.chat-container{
    height:100vh;
    width:100%;
    display:flex;
    flex-direction:column;
    background:var(--bg);
}

.chat-header{
    background:#4f46e5;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:20px;
    font-weight:bold;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
}

.message{
    max-width:75%;
    padding:12px;
    margin-bottom:12px;
    border-radius:16px;
    word-wrap:break-word;
    animation:fadeIn 0.2s ease;
}

.sent{
    align-self:flex-end;
    background:var(--sent);
    color:white;
}

.received{
    align-self:flex-start;
    background:var(--received);
    color:white;
}

.time{
    font-size:11px;
    opacity:0.7;
    margin-top:5px;
    text-align:right;
}

.input-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    background:var(--card);
    position:sticky;
    bottom:0;
}

#msg{
    flex:1;
    padding:14px;
    border:none;
    border-radius:25px;
    outline:none;
    font-size:16px;
}

#sendBtn{
    background:#4f46e5;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:20px;
    cursor:pointer;
}

#emojiBtn{
    background:none;
    border:none;
    font-size:26px;
}

#themeBtn{
    border:none;
    background:white;
    padding:8px 12px;
    border-radius:12px;
    cursor:pointer;
}

emoji-picker{
    position:absolute;
    bottom:80px;
    left:10px;
    display:none;
    z-index:1000;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
    <span>Logged in as: {{ username }}</span>

    <button id="themeBtn" onclick="toggleTheme()">
        🌙
    </button>
</div>

<ul id="chat" class="chat-box">

{% for msg in messages %}

<li class="message {% if msg.sender.username == username %}sent{% else %}received{% endif %}">

<b>{{ msg.sender.username }}</b><br>

{{ msg.content }}

<div class="time">
{{ msg.timestamp|date:"H:i" }}
</div>

</li>

{% endfor %}

</ul>

<div class="input-row">

<button id="emojiBtn">😊</button>

<input
type="text"
id="msg"
placeholder="Type a message..."
autocomplete="off"
>

<button id="sendBtn" onclick="sendMessage()">
Send
</button>

</div>

<emoji-picker id="emojiPicker"></emoji-picker>

</div>

<script>

const protocol =
window.location.protocol === "https:"
? "wss"
: "ws";

const socket = new WebSocket(
protocol + "://" + window.location.host + "/ws/chat/"
);

const me = "{{ username }}";

const chat = document.getElementById("chat");

socket.onmessage = function(e){

    const data = JSON.parse(e.data);

    const li = document.createElement("li");

    li.className =
    "message " +
    (data.sender === me ? "sent" : "received");

    li.innerHTML = `
        <b>${data.sender}</b><br>
        ${data.message}
        <div class="time">
            ${new Date().toLocaleTimeString([],{
                hour:'2-digit',
                minute:'2-digit'
            })}
        </div>
    `;

    chat.appendChild(li);

    chat.scrollTop = chat.scrollHeight;

    if(
        data.sender !== me &&
        Notification.permission === "granted"
    ){

        new Notification("New Message 💬",{
            body:data.sender + ": " + data.message
        });

    }
};

function sendMessage(){

    const input = document.getElementById("msg");

    if(input.value.trim() === "") return;

    socket.send(JSON.stringify({
        message:input.value
    }));

    input.value = "";
}

document.getElementById("msg")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        sendMessage();
    }

});

if(Notification.permission !== "granted"){
    Notification.requestPermission();
}

function toggleTheme(){

    document.body.classList.toggle("light");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("light")
        ? "light"
        : "dark"
    );
}

window.onload = () => {

    if(localStorage.getItem("theme") === "light"){
        document.body.classList.add("light");
    }

    chat.scrollTop = chat.scrollHeight;
};

const emojiBtn =
document.getElementById("emojiBtn");

const emojiPicker =
document.getElementById("emojiPicker");

const input =
document.getElementById("msg");

emojiBtn.addEventListener("click",()=>{

    emojiPicker.style.display =
    emojiPicker.style.display === "none"
    ? "block"
    : "none";

});

emojiPicker.addEventListener("emoji-click",event=>{

    input.value += event.detail.unicode;

    emojiPicker.style.display = "none";

});

</script>

</body>
</html>
