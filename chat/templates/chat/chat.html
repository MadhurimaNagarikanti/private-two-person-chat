<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Private Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0f172a;
height:100vh;
overflow:hidden;
}

.chat-container{
display:flex;
flex-direction:column;
height:100vh;
}

.chat-header{
background:#4f46e5;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
}

.logout-btn{
background:white;
padding:8px 14px;
border-radius:10px;
text-decoration:none;
color:black;
font-size:14px;
}

.chat-box{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.message{
max-width:75%;
padding:12px;
border-radius:15px;
color:white;
word-wrap:break-word;
}

.sent{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
align-self:flex-end;
}

.received{
background:#334155;
align-self:flex-start;
}

.time{
font-size:11px;
opacity:0.7;
margin-top:5px;
}

.input-row{
display:flex;
padding:10px;
background:#1e293b;
gap:10px;
}

#msg{
flex:1;
padding:14px;
border:none;
border-radius:30px;
outline:none;
font-size:16px;
}

#sendBtn{
background:#4f46e5;
color:white;
border:none;
padding:0 20px;
border-radius:20px;
cursor:pointer;
}

.typing{
color:white;
padding-left:15px;
font-size:14px;
padding-bottom:5px;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="chat-header">

<div>
{{ username }}
</div>

<a href="/logout/" class="logout-btn">
Logout
</a>

</div>

<ul id="chat" class="chat-box">

{% for msg in messages %}

<li class="message {% if msg.sender.username == username %}sent{% else %}received{% endif %}">

<b>{{ msg.sender.username }}</b><br>

{{ msg.content }}

<div class="time">
{{ msg.timestamp|date:"H:i" }}
</div>

</li>

{% endfor %}

</ul>

<div class="typing" id="typing"></div>

<div class="input-row">

<input
type="text"
id="msg"
placeholder="Type message..."
autocomplete="off"
>

<button id="sendBtn">
Send
</button>

</div>

</div>

<script>

const protocol =
window.location.protocol === "https:"
? "wss"
: "ws";

const socket = new WebSocket(
protocol + "://" + window.location.host + "/ws/chat/"
);

const me = "{{ username }}";

const input = document.getElementById("msg");

const chat = document.getElementById("chat");

const typingDiv = document.getElementById("typing");

socket.onmessage = function(e){

const data = JSON.parse(e.data);

if(data.typing){

typingDiv.innerHTML =
data.sender + " is typing...";

setTimeout(()=>{
typingDiv.innerHTML = "";
},1000);

return;
}

const li = document.createElement("li");

li.className =
"message " +
(data.sender === me ? "sent" : "received");

li.innerHTML = `
<b>${data.sender}</b><br>
${data.message}
<div class="time">
${new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})}
</div>
`;

chat.appendChild(li);

chat.scrollTop = chat.scrollHeight;

if(
data.sender !== me &&
Notification.permission === "granted"
){

new Notification("New Message",{
body:data.sender + ": " + data.message
});

}

};

function sendMessage(){

if(input.value.trim() === "") return;

socket.send(JSON.stringify({
message:input.value
}));

input.value = "";

}

document
.getElementById("sendBtn")
.onclick = sendMessage;

input.addEventListener("keypress",function(e){

socket.send(JSON.stringify({
typing:true
}));

if(e.key === "Enter"){
sendMessage();
}

});

if(Notification.permission !== "granted"){
Notification.requestPermission();
}

window.onload = () => {
chat.scrollTop = chat.scrollHeight;
};

</script>

</body>
</html>
