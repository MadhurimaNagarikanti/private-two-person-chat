<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Two-Person Chat</title>

<!-- Emoji Picker -->
<script type="module"
src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js">
</script>

<style>

:root {
    --bg: #f5f5f5;
    --card: #ffffff;
    --text: #1f2937;
    --sent: linear-gradient(135deg, #ff9a9e, #fad0c4);
    --received: #e5e7eb;
}

body.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #f8fafc;
    --sent: linear-gradient(135deg, #6366f1, #8b5cf6);
    --received: #334155;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    transition: 0.3s;
}

.chat-container {
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--card);
}

.chat-header {
    background: #4f46e5;
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.chat-header button {
    border: none;
    background: white;
    padding: 6px 10px;
    border-radius: 8px;
    cursor: pointer;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    list-style: none;
    display: flex;
    flex-direction: column;
}

.message {
    max-width: 75%;
    padding: 10px;
    border-radius: 12px;
    margin-bottom: 10px;
    word-wrap: break-word;
}

.sent {
    background: var(--sent);
    margin-left: auto;
    text-align: right;
}

.received {
    background: var(--received);
    margin-right: auto;
}

.time {
    font-size: 10px;
    opacity: 0.7;
    margin-top: 4px;
}

.input-row {
    display: flex;
    gap: 8px;
    padding: 10px;
    border-top: 1px solid #ddd;
    background: var(--card);
    align-items: center;
}

#msg {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

#sendBtn {
    border: none;
    background: #4f46e5;
    color: white;
    padding: 12px 18px;
    border-radius: 20px;
    cursor: pointer;
}

#emojiBtn {
    border: none;
    background: none;
    font-size: 24px;
    cursor: pointer;
}

emoji-picker {
    position: absolute;
    bottom: 70px;
    left: 10px;
    display: none;
    z-index: 999;
}

</style>
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        <strong>
            Logged in as: {{ username }}
        </strong>

        <button onclick="toggleTheme()">
            🌙
        </button>
    </div>

    <ul id="chat" class="chat-box">

        {% for msg in messages %}

        <li class="message {% if msg.sender.username == username %}sent{% else %}received{% endif %}">

            <small>{{ msg.sender.username }}</small><br>

            {{ msg.text }}

            <div class="time">
                {{ msg.timestamp|date:"H:i" }}

                {% if msg.sender.username == username %}
                    {% if msg.seen %}
                        ✔✔
                    {% else %}
                        ✔
                    {% endif %}
                {% endif %}
            </div>

        </li>

        {% endfor %}

    </ul>

    <div class="input-row">

        <button id="emojiBtn">
            😊
        </button>

        <input
            id="msg"
            placeholder="Type a message"
            autocomplete="off"
        >

        <button id="sendBtn" onclick="send()">
            Send
        </button>

    </div>

    <emoji-picker id="emojiPicker"></emoji-picker>

</div>

<script>

/* Secure WebSocket */
const protocol =
    window.location.protocol === "https:"
        ? "wss"
        : "ws";

const socket = new WebSocket(
    protocol + "://" + window.location.host + "/ws/chat/"
);

const me = "{{ username }}";

/* Notification Permission */
if (Notification.permission !== "granted") {
    Notification.requestPermission();
}

/* Receive Messages */
socket.onmessage = function(e) {

    const data = JSON.parse(e.data);

    const li = document.createElement("li");

    li.className =
        "message " +
        (data.sender === me ? "sent" : "received");

    const time = new Date().toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
    });

    li.innerHTML = `
        <small>${data.sender}</small><br>

        ${data.message}

        <div class="time">
            ${time}
        </div>
    `;

    const chat = document.getElementById("chat");

    chat.appendChild(li);

    chat.scrollTop = chat.scrollHeight;

    /* Notifications */
    if (
        data.sender !== me &&
        Notification.permission === "granted"
    ) {

        new Notification("New Message 💬", {
            body: data.sender + ": " + data.message,
            icon:
            "https://cdn-icons-png.flaticon.com/512/733/733585.png"
        });

    }
};

/* Send Message */
function send() {

    const input = document.getElementById("msg");

    if (!input.value.trim()) return;

    socket.send(JSON.stringify({
        message: input.value
    }));

    input.value = "";
}

/* Enter Key Send */
document.getElementById("msg")
.addEventListener("keypress", function(e) {

    if (e.key === "Enter") {
        send();
    }
});

/* Dark Theme */
function toggleTheme() {

    document.body.classList.toggle("dark");

    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark")
            ? "dark"
            : "light"
    );
}

/* On Load */
window.onload = () => {

    const chat = document.getElementById("chat");

    chat.scrollTop = chat.scrollHeight;

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
    }
};

/* Emoji Picker */
const emojiBtn =
    document.getElementById("emojiBtn");

const emojiPicker =
    document.getElementById("emojiPicker");

const input =
    document.getElementById("msg");

emojiBtn.addEventListener("click", () => {

    emojiPicker.style.display =
        emojiPicker.style.display === "none"
            ? "block"
            : "none";
});

emojiPicker.addEventListener(
    "emoji-click",
    event => {

        input.value += event.detail.unicode;

        emojiPicker.style.display = "none";
    }
);

</script>

</body>
</html>
